# Strategy manifest (PRD v2.0)
# Senior can update selectors/sitemaps here without changing crawler code.

kompas.com:
  method: "css"
  selectors:
    title: "h1.read__title, h1"
    body: "div.read__content, article"
    next_page: "a.paging__link--next"
  strip:
    - "script"
    - "style"
    - "nav"
    - "footer"
    - "header"
    - "aside"
    - "noscript"
    - "form"
    - ".ads"
    - ".video-payload"
  # Sitemap seeds (crawler will recurse sitemap_index/sitemap)
  sitemaps:
    - "https://www.kompas.com/sitemap.xml"
    - "https://www.kompas.com/sitemap_index.xml"
  # Allow-list for URL discovery (high-signal article pages)
  allow:
    - "/read/"

# ---------------------------------------------------------------------------
# NEW DOMAINS — custom extraction strategies (zara_adjust.md)
# ---------------------------------------------------------------------------

detik.com:
  method: "custom_detik"
  selectors:
    title: "h1.detail__title, h1"
    body: "div.detail__body-text.itp_bodycontent"
    body_children: "div.detail__body-text.itp_bodycontent > p"
    dateline_strong: "div.detail__body-text.itp_bodycontent > p:first-of-type > strong:first-child"
    list_items: "div.detail__body-text.itp_bodycontent > ul > li, div.detail__body-text.itp_bodycontent > ol > li"
  strip:
    - "script"
    - "style"
    - "nav"
    - "footer"
    - "header"
    - "aside"
    - "noscript"
    - "form"
    - ".clearfix"
    - "table.linksisip"
    - "div.sisip_artikel"
    - "div.video-20detik"
    - "div.embed-video"
  sitemaps:
    - "https://www.detik.com/sitemap.xml"
  allow:
    - "/edu/"

ruangguru.com:
  method: "custom_ruangguru"
  selectors:
    title: "h1"
    body: "div.content-body"
  strip:
    - "script"
    - "style"
    - "nav"
    - "footer"
    - "header"
    - "aside"
    - "noscript"
    - "form"
  sitemaps:
    - "https://www.ruangguru.com/sitemap.xml"
  allow:
    - "/blog/"

liputan6.com:
  method: "custom_liputan6"
  selectors:
    title: "h1.read-page--header--title, h1"
    body: "div.article-content-body__item-content"
  strip:
    - "script"
    - "style"
    - "nav"
    - "footer"
    - "header"
    - "aside"
    - "noscript"
    - "form"
    - "div.baca-juga-collections"
    - "div.advertisement-placeholder"
    - "div.article-ad"
    - "[id*='gpt-ad']"
    - "[id*='revive-ad']"
    - "div.tags--snippet"
    - "div#preco"
  sitemaps:
    - "https://www.liputan6.com/sitemap.xml"
  allow:
    - "/read/"

